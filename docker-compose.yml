version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: agrierp_db
    ports:
      - "27017:27017"
    volumes:
      - agrierp_data:/data/db

  backend:
    build: ./server
    container_name: agrierp_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=${PORT:-5000}
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/agrierp}
      - JWT_SECRET=${JWT_SECRET:-your_dev_secret}
      - JWT_EXPIRE=${JWT_EXPIRE:-30d}
      - NODE_ENV=${NODE_ENV:-development}
      - CLIENT_URL=${CLIENT_URL:-http://localhost}
    depends_on:
      - mongodb

  frontend:
    build: ./client
    container_name: agrierp_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  agrierp_data:
